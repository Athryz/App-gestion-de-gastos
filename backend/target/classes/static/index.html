<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Financiero</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
</head>
<body>

    <div id="section-auth" class="auth-screen">
        <div class="login-box">
            <h2 id="auth-title">Welcome!</h2>
            <form id="auth-form">
                <div id="name-group" class="input-group hidden">
                    <label>Nombre</label>
                    <input type="text" id="auth-name" placeholder="Your name">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" required placeholder="email@example.com">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="auth-password" required placeholder="••••••••">
                </div>
                <button type="submit" id="auth-submit" class="floral-button">Login</button>
            </form>
            <p class="toggle-text">
                <span id="auth-toggle">Aún no tienes cuenta? Regístrate aquí</span>
            </p>
        </div>
    </div>

    <div id="section-app" class="app-container hidden">
        <header class="floral-header">
            <div class="user-info">
                <h1>Hola, <span id="user-display-name"></span>!</h1>
                <span id="role-badge" class="role-badge"></span>
            </div>
            
            <div class="header-actions">
                <div class="notif-block">
                    <button class="notif-button" onclick="toggleNotificaciones(event)">
                        Notificaciones <span id="notif-count" class="notif-circle hidden">0</span>
                    </button>
                    <div id="notif-dropdown" class="notif-menu hidden">
                        <div class="notif-title">Últimas Actualizaciones</div>
                        <ul id="notificaciones-list"></ul>
                    </div>
                </div>
                <button onclick="cerrarSesion()" class="exit-button">Cerrar Sesión</button>
            </div>
        </header>
        
        <main class="main">
            <div class="card">
                <div id="saldo" class="balance-display">...</div>
                <div id="calendar" class="view"></div>
            </div>
        </main>
    </div>

    <div id="modalMovimiento" class="modal-overlay hidden">
        <div class="modal-window">
            <div class="modal-header">
                <h2 id="modalTitulo">Nuevo Registro</h2>
            </div>
            <p id="modalFechaText" class="selected-date"></p>

            <div class="input-group">
                <label>Descripción</label>
                <input type="text" id="desc" class="modal-input">
            </div>
            
            <div class="input-group">
                <label>Cantidad</label>
                <input type="number" id="monto" class="modal-input">
            </div>

            <div class="input-group">
                <label>Tipo</label>
                <select id="tipo" class="modal-select">
                    <option value="INCOME">Ingreso</option>
                    <option value="EXPENSE">Gasto</option>
                </select>
            </div>

            <div class="modal-actions">
                <button id="btnGuardar" class="floral-button">Guardar</button>
                <button id="btnBorrar" class="floral-button hidden" style="background:#fb6f92">Borrar</button>
                <button type="button" onclick="cerrarModal()" class="exit-button" style="width:100%">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
