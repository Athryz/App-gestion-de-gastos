version: '3.8'
services:
  db:
    image: postgres:15
    container_name: gestor_db
    environment:
      POSTGRES_DB: gestor_gastos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: